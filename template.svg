<svg width="500" height="240" viewBox="0 0 500 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="0" y="0" width="500" height="240" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#282a36;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#191b24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <rect x="20" y="20" width="460" height="200" rx="12" fill="url(#grad)" stroke="#44475a" stroke-width="1"/>
    
    <circle cx="45" cy="40" r="5" fill="#ff5555"/>
    <circle cx="65" cy="40" r="5" fill="#f1fa8c"/>
    <circle cx="85" cy="40" r="5" fill="#50fa7b"/>
    <text x="105" y="45" fill="#6272a4" font-family="monospace" font-size="11">mridul — terminal</text>

    <g font-family="monospace" font-size="14">
      <text x="45" y="80">
        <tspan fill="#50fa7b">➜ </tspan>
        <tspan fill="#8be9fd">~ </tspan>
        <tspan fill="#f8f8f2">git fetch-stats --user </tspan>
        <tspan fill="#ff79c6">Spinachboul</tspan>
      </text>

      <text x="45" y="110" fill="#6272a4" font-size="12">Fetching remote data...</text>
      
      <g fill="#f8f8f2">
        <text x="45" y="145" fill="#bd93f9">Total Repos</text>
        <text x="160" y="145">:</text>
        <text x="180" y="145" font-weight="bold">61</text>

        <text x="45" y="165" fill="#bd93f9">Followers</text>
        <text x="160" y="165">:</text>
        <text x="180" y="165" font-weight="bold">22</text>

        <text x="45" y="185" fill="#bd93f9">Status</text>
        <text x="160" y="185">:</text>
        <text x="180" y="185" fill="#50fa7b">Active</text>
      </g>

      <rect x="45" y="200" width="8" height="2" fill="#f8f8f2">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
